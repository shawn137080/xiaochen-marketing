services:
  # ── xiaohongshu-mcp：浏览器自动化，负责发布和采集 ──
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "18060:18060"
    volumes:
      - mcp-cookies:/app/cookies    # 登录 cookies 持久化
      - xhs-images:/data/images     # 图片共享目录（与 tools 容器路径一致）
    environment:
      - ROD_BROWSER_BIN=/usr/bin/google-chrome
    command: ["sh", "-c", "ln -sf /app/cookies/cookies.json /app/cookies.json && ./app -headless=true -port :18060"]

  # ── xhs-tools：dashboard + daemon ──
  tools:
    build: .
    restart: unless-stopped
    ports:
      - "3100:3100"                 # Dashboard UI
    volumes:
      - xhs-data:/data              # SQLite 数据库
      - xhs-images:/data/images     # 图片（与 mcp 共享）
    environment:
      - XHS_DB_PATH=/data/xhs.db
      - XHS_IMAGES_DIR=/data/images
      - XHS_MCP_URL=http://mcp:18060/mcp
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://aiberm.com/v1}
      - LLM_MODEL=${LLM_MODEL:-google/gemini-3-flash}
      - NOTIFY_WEBHOOK_URL=${NOTIFY_WEBHOOK_URL:-}
      - DASHBOARD_URL=${DASHBOARD_URL:-http://localhost:3100}
      - NODE_ENV=production
    depends_on:
      - mcp

volumes:
  mcp-cookies:
  xhs-data:
  xhs-images:
